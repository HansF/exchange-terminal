services:
  exchange-terminal:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PORT=3001
      - PRINT_SERVICE_URL=${PRINT_SERVICE_URL:-http://printd:8080}
      - PRINT_SERVICE_KEY=${PRINT_SERVICE_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GEMINI_IMAGE_MODEL=${GEMINI_IMAGE_MODEL:-gemini-2.5-flash-image}
    volumes:
      - sqlite-data:/app/data
    depends_on:
      printd:
        condition: service_started
    healthcheck:
      test:
        [
          'CMD',
          'wget',
          '--no-verbose',
          '--tries=1',
          '--spider',
          'http://localhost:3001/api/healthz',
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  printd:
    image: ghcr.io/hansf/printd:latest
    ports:
      - '8080:8080'
    environment:
      - PRINTD_API_KEY=${PRINTD_API_KEY:-}
      - PRINTD_DEVICE=${PRINTD_DEVICE:-/dev/usb/lp0}
      - PRINTD_PRINTER_KIND=${PRINTD_PRINTER_KIND:-usb}
    volumes:
      - /dev/bus/usb:/dev/bus/usb:ro
    restart: unless-stopped

volumes:
  sqlite-data:
